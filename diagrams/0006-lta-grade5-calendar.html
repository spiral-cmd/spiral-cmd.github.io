<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTA Grade 5 Tournaments — Jun/Jul 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; color: #1a1a2e; padding: 20px; }
  .container { max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 4px; color: #16213e; }
  .subtitle { color: #555; font-size: 0.9rem; margin-bottom: 20px; }
  .legend { display: flex; gap: 20px; margin-bottom: 16px; font-size: 0.85rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .legend-dot.g5 { background: #2563eb; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day-header { text-align: center; font-weight: 600; font-size: 0.8rem; color: #666; padding: 6px 0; }
  .day-cell { background: white; border-radius: 8px; padding: 8px; min-height: 100px; border: 1px solid #e2e8f0; }
  .day-cell.empty { background: transparent; border: none; min-height: 0; }
  .day-cell.other-month { opacity: 0.4; }
  .day-number { font-weight: 600; font-size: 0.85rem; color: #333; margin-bottom: 4px; }
  .day-cell.today .day-number { background: #2563eb; color: white; display: inline-block; padding: 1px 7px; border-radius: 50%; }
  .event { display: block; font-size: 0.7rem; padding: 3px 5px; margin-bottom: 3px; border-radius: 4px; background: #dbeafe; color: #1e40af; border-left: 3px solid #2563eb; text-decoration: none; transition: transform 0.1s, box-shadow 0.1s; }
  .event:hover { transform: scale(1.03); box-shadow: 0 2px 6px rgba(37,99,235,0.2); }
  .event .loc { display: block; font-size: 0.65rem; color: #555; }
  .event .age { display: inline-block; font-size: 0.6rem; background: rgba(37,99,235,0.12); padding: 0 3px; border-radius: 2px; margin-left: 2px; }
  .summary { margin-top: 16px; background: white; border-radius: 8px; padding: 14px; border: 1px solid #e2e8f0; }
  .summary h3 { font-size: 0.95rem; margin-bottom: 8px; }
  .summary ul { list-style: none; font-size: 0.85rem; }
  .summary li { padding: 3px 0; }
  .summary .count { font-weight: 600; color: #2563eb; }
  @media (max-width: 700px) {
    .calendar-grid { grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .day-cell { min-height: 70px; padding: 4px; }
    .event { font-size: 0.6rem; padding: 2px 3px; }
    .day-number { font-size: 0.75rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎾 LTA Grade 5 Tournaments</h1>
  <p class="subtitle">14U Boys Singles · 20mi from London · 13 Jun – 12 Jul 2026</p>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot g5"></span> Grade 5</div>
  </div>

  <div class="calendar-grid" id="calendar"></div>

  <div class="summary" id="summary"></div>
</div>

<script>
const tournaments = [
  { name: "National Tennis Centre", loc: "Surrey, 7mi", age: "Open/14U/18U", date: "2026-06-21", url: "https://competitions.lta.org.uk/tournament/67E37A3A-7AA5-4BBA-A76F-51286BF3BCF5" },
  { name: "Oxted School", loc: "18mi", age: "11U/16U/14U", date: "2026-06-21", url: "https://competitions.lta.org.uk/tournament/7483E3D5-FABF-4CE6-8066-FBD894F39251" },
  { name: "Russell Park", loc: "Kent, 11mi", age: "11U/14U", date: "2026-06-21", url: "https://competitions.lta.org.uk/tournament/6A67602A-B4E9-41D8-9398-AF30AB9A7142" },
  { name: "The Avenue LTC", loc: "Middlesex, 7.4mi", age: "14U", date: "2026-06-21", url: "https://competitions.lta.org.uk/tournament/35A85436-5289-4F56-8AFC-3F49D37AAB70" },
  { name: "Sutton Tennis Academy", loc: "Surrey, 9.5mi", age: "Open/16U/14U", date: "2026-06-21", url: "https://competitions.lta.org.uk/tournament/227A2D15-E3D4-4033-B57C-5FA82FAF6228" },
  { name: "Brunel University", loc: "Middlesex, 16mi", age: "12U/16U/14U", date: "2026-07-11", url: "https://competitions.lta.org.uk/tournament/B11ADC43-AF00-489D-85A4-76CC90F0D8C0" },
  { name: "Cobham Tennis Club", loc: "Surrey, 17mi", age: "14U", date: "2026-07-11", url: "https://competitions.lta.org.uk/tournament/29194C94-6B3B-41EC-8B3C-FAE4F1189D5B" },
  { name: "Raphael Park Tennis Club", loc: "Essex, 14mi", age: "14U", date: "2026-07-11", url: "https://competitions.lta.org.uk/tournament/DEFCD21B-7558-43DF-9854-5C6A6027DF19" }
];

const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function buildCalendar() {
  const grid = document.getElementById("calendar");
  const summary = document.getElementById("summary");

  dayNames.forEach(d => {
    const h = document.createElement("div");
    h.className = "day-header";
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstDay = new Date(2026, 5, 1);
  const endGrid = new Date(2026, 6, 19);
  const windowStart = new Date(2026, 5, 13);
  const windowEnd = new Date(2026, 6, 12);

  let d = new Date(firstDay);
  while (d <= endGrid) {
    const cell = document.createElement("div");
    cell.className = "day-cell";

    const inRange = d >= windowStart && d <= windowEnd;
    if (!inRange) cell.classList.add("other-month");

    const num = document.createElement("div");
    num.className = "day-number";
    num.textContent = d.getDate();
    cell.appendChild(num);

    const today = new Date();
    if (d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth() && d.getDate() === today.getDate()) {
      cell.classList.add("today");
    }

    const dateStr = fmtDate(d);
    const dayEvents = tournaments.filter(t => t.date === dateStr);
    dayEvents.forEach(t => {
      const a = document.createElement("a");
      a.className = "event";
      a.href = t.url;
      a.target = "_blank";
      a.rel = "noopener";
      a.innerHTML = `${t.name} <span class="loc">${t.loc} <span class="age">${t.age}</span></span>`;
      cell.appendChild(a);
    });

    grid.appendChild(cell);
    d.setDate(d.getDate() + 1);
  }

  const uniqueDates = [...new Set(tournaments.map(t => t.date))].sort();
  const monthNames = ["Jun", "Jul"];
  let html = `<h3>📋 Summary — <span class="count">${tournaments.length}</span> Grade 5 tournaments across ${uniqueDates.length} days</h3><ul>`;
  uniqueDates.forEach(dateStr => {
    const parts = dateStr.split("-");
    const dt = new Date(+parts[0], +parts[1] - 1, +parts[2]);
    const dayIdx = dt.getDay() === 0 ? 6 : dt.getDay() - 1;
    const dayName = dayNames[dayIdx];
    const monthName = monthNames[dt.getMonth() === 5 ? 0 : 1];
    const dayEvents = tournaments.filter(t => t.date === dateStr);
    html += `<li><strong>${dayName} ${dt.getDate()} ${monthName}</strong> — ${dayEvents.length} tournament${dayEvents.length > 1 ? "s" : ""}: ${dayEvents.map(t => `<a href="${t.url}" target="_blank" rel="noopener">${t.name}</a> (${t.loc}, ${t.age})`).join(", ")}</li>`;
  });
  html += "</ul>";
  summary.innerHTML = html;
}

buildCalendar();
</script>
</body>
</html>
