<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OpenClaw Agent Workflow</title>
  <style>
    body {
      margin: 0;
      background: #f8f9fb;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }
    h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-bottom: 32px;
    }
    svg { max-width: 100%; height: auto; }
  </style>
</head>
<body>

<h1>OpenClaw — Agent Workflow</h1>
<p class="sub">Delegation chain · communication channels · escalation</p>

<svg viewBox="0 0 1060 860" width="1060" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-y" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- ── AGENT NODES (left column) ───────────────────── -->

  <!-- Martin -->
  <rect x="80" y="40" width="220" height="72" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="190" y="68" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">Martin</text>
  <text x="190" y="85" text-anchor="middle" font-size="10" fill="#9a3412" letter-spacing="0.08em">HUMAN</text>
  <text x="190" y="101" text-anchor="middle" font-size="10" fill="#9ca3af">assigns tasks · receives output</text>

  <!-- CC -->
  <rect x="80" y="180" width="220" height="84" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="190" y="208" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">CC</text>
  <text x="190" y="224" text-anchor="middle" font-size="10" fill="#1e40af" letter-spacing="0.08em">ARCHITECT</text>
  <text x="190" y="241" text-anchor="middle" font-size="10" fill="#6b7280" font-family="Menlo,monospace">claude-sonnet-4-6</text>
  <text x="190" y="256" text-anchor="middle" font-size="10" fill="#9ca3af">$3/$15 per M · 200k ctx</text>

  <!-- io -->
  <rect x="80" y="340" width="220" height="84" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="190" y="368" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">io</text>
  <text x="190" y="384" text-anchor="middle" font-size="10" fill="#166534" letter-spacing="0.08em">ORCHESTRATOR</text>
  <text x="190" y="401" text-anchor="middle" font-size="10" fill="#6b7280" font-family="Menlo,monospace">xiaomi/mimo-v2.5-pro</text>
  <text x="190" y="416" text-anchor="middle" font-size="10" fill="#9ca3af">$1/$3 per M · 1M ctx</text>

  <!-- Polo -->
  <rect x="80" y="500" width="220" height="84" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="190" y="528" text-anchor="middle" font-size="15" font-weight="700" fill="#7e22ce">Polo</text>
  <text x="190" y="544" text-anchor="middle" font-size="10" fill="#6b21a8" letter-spacing="0.08em">EXECUTOR</text>
  <text x="190" y="561" text-anchor="middle" font-size="10" fill="#6b7280" font-family="Menlo,monospace">google/gemma-4-31b-it</text>
  <text x="190" y="576" text-anchor="middle" font-size="10" fill="#9ca3af">$0.10/$0.30 per M · 131k ctx ⚠</text>

  <!-- codo -->
  <rect x="80" y="660" width="220" height="84" rx="10" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5"/>
  <text x="190" y="688" text-anchor="middle" font-size="15" font-weight="700" fill="#be123c">codo</text>
  <text x="190" y="704" text-anchor="middle" font-size="10" fill="#9f1239" letter-spacing="0.08em">CODE GENERATOR · spawned by Polo</text>
  <text x="190" y="721" text-anchor="middle" font-size="10" fill="#6b7280" font-family="Menlo,monospace">deepseek-ai/DeepSeek-V4-Flash</text>
  <text x="190" y="736" text-anchor="middle" font-size="10" fill="#9ca3af">$0.14/$0.28 per M · single-shot</text>

  <!-- ── VERTICAL CONNECTORS ──────────────────────────── -->

  <!-- Martin ↔ CC -->
  <line x1="168" y1="113" x2="168" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="212" y1="178" x2="212" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="148" y="150" text-anchor="end" font-size="10" fill="#6b7280">assigns task</text>
  <text x="232" y="150" text-anchor="start" font-size="10" fill="#6b7280">final output</text>

  <!-- CC ↔ io -->
  <line x1="168" y1="265" x2="168" y2="338" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="212" y1="338" x2="212" y2="267" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="148" y="304" text-anchor="end" font-size="10" fill="#6b7280">task brief</text>
  <text x="232" y="298" text-anchor="start" font-size="10" fill="#6b7280">phase report</text>
  <text x="232" y="311" text-anchor="start" font-size="10" fill="#6b7280">+ review</text>

  <!-- io ↔ Polo -->
  <line x1="168" y1="425" x2="168" y2="498" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="212" y1="498" x2="212" y2="427" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="148" y="460" text-anchor="end" font-size="10" fill="#6b7280">brief + ETA</text>
  <text x="232" y="455" text-anchor="start" font-size="10" fill="#6b7280">events</text>
  <text x="232" y="467" text-anchor="start" font-size="10" fill="#6b7280">(io-inbox)</text>

  <!-- Polo ↔ codo -->
  <line x1="168" y1="585" x2="168" y2="658" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="212" y1="658" x2="212" y2="587" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="148" y="621" text-anchor="end" font-size="10" fill="#6b7280">coding brief</text>
  <text x="232" y="621" text-anchor="start" font-size="10" fill="#6b7280">code block</text>

  <!-- ── CHANNEL NODES (centre column) ───────────────── -->

  <!-- Sermo -->
  <rect x="370" y="52" width="200" height="52" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1.5"/>
  <text x="470" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">Sermo</text>
  <text x="470" y="90" text-anchor="middle" font-size="10" fill="#713f12">Telegram topic 111</text>
  <text x="470" y="103" text-anchor="middle" font-size="9.5" fill="#9ca3af">Martin visibility · [CC]/[io]/[Polo]</text>

  <!-- to-cc.md -->
  <rect x="370" y="200" width="200" height="52" rx="8" fill="white" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="470" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#374151" font-family="Menlo,monospace">to-cc.md</text>
  <text x="470" y="238" text-anchor="middle" font-size="10" fill="#6b7280">Polo / io → CC</text>
  <text x="470" y="250" text-anchor="middle" font-size="9.5" fill="#9ca3af">reports · blockers · phase summaries</text>

  <!-- io-inbox.md -->
  <rect x="370" y="355" width="200" height="52" rx="8" fill="white" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="470" y="377" text-anchor="middle" font-size="12" font-weight="700" fill="#374151" font-family="Menlo,monospace">io-inbox.md</text>
  <text x="470" y="393" text-anchor="middle" font-size="10" fill="#6b7280">Polo → io (JSON events)</text>
  <text x="470" y="405" text-anchor="middle" font-size="9.5" fill="#9ca3af">append-only · io polls every 5 min</text>

  <!-- polo-inbox.md -->
  <rect x="370" y="420" width="200" height="52" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="470" y="442" text-anchor="middle" font-size="12" font-weight="700" fill="#374151" font-family="Menlo,monospace">polo-inbox.md</text>
  <text x="470" y="458" text-anchor="middle" font-size="10" fill="#6b7280">io → Polo (check-ins)</text>
  <text x="470" y="470" text-anchor="middle" font-size="9.5" fill="#ef4444">⚠ fails at 100% ctx</text>

  <!-- codo-brief.md -->
  <rect x="370" y="520" width="200" height="52" rx="8" fill="white" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="470" y="542" text-anchor="middle" font-size="12" font-weight="700" fill="#374151" font-family="Menlo,monospace">codo-brief.md</text>
  <text x="470" y="558" text-anchor="middle" font-size="10" fill="#6b7280">Polo → codo</text>
  <text x="470" y="570" text-anchor="middle" font-size="9.5" fill="#9ca3af">file pattern (sessions_send blocked)</text>

  <!-- ── HORIZONTAL CONNECTORS ─────────────────────── -->

  <!-- All agents → Sermo -->
  <line x1="300" y1="78" x2="368" y2="78" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-y)"/>
  <text x="334" y="72" text-anchor="middle" font-size="9" fill="#b45309">all agents</text>

  <!-- CC ↔ to-cc.md -->
  <line x1="300" y1="220" x2="368" y2="220" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="368" y1="234" x2="300" y2="234" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- io ↔ io-inbox + polo-inbox -->
  <line x1="300" y1="374" x2="368" y2="374" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="368" y1="454" x2="300" y2="400" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Polo ↔ io-inbox + polo-inbox + codo-brief -->
  <line x1="300" y1="530" x2="368" y2="392" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="368" y1="462" x2="300" y2="544" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="300" y1="558" x2="368" y2="548" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ── RIGHT COLUMN: Rules ──────────────────────── -->

  <!-- Hard rules -->
  <rect x="630" y="40" width="400" height="204" rx="10" fill="white" stroke="#fecaca" stroke-width="1.5"/>
  <text x="650" y="66" font-size="11" font-weight="700" fill="#dc2626" letter-spacing="0.06em">HARD RULES</text>
  <line x1="650" y1="72" x2="1010" y2="72" stroke="#fecaca" stroke-width="1"/>
  <text x="658" y="92"  font-size="11" fill="#374151">→  CC does not implement or run scripts</text>
  <text x="658" y="112" font-size="11" fill="#374151">→  io does not implement — Polo does</text>
  <text x="658" y="132" font-size="11" fill="#374151">→  Never skip a layer  (CC → io → Polo)</text>
  <text x="658" y="152" font-size="11" fill="#374151">→  Polo at 100% ctx: fresh session only</text>
  <text x="658" y="172" font-size="11" fill="#374151">→  polo-inbox.md fails at 100% ctx</text>
  <text x="658" y="192" font-size="11" fill="#374151">→  Ping before every delegation (5s timeout)</text>
  <text x="658" y="212" font-size="11" fill="#374151">→  Max 15 tool calls / task  (loop guard)</text>

  <!-- codo spawn -->
  <rect x="630" y="262" width="190" height="148" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="650" y="284" font-size="11" font-weight="700" fill="#374151" letter-spacing="0.05em">CODO SPAWN</text>
  <line x1="650" y1="290" x2="800" y2="290" stroke="#e5e7eb" stroke-width="1"/>
  <text x="650" y="308" font-size="10.5" fill="#6b7280">Trigger: new code &gt;20 lines</text>
  <text x="650" y="326" font-size="10.5" fill="#6b7280">Brief: fully self-contained file</text>
  <text x="650" y="344" font-size="10.5" fill="#6b7280">Returns: one fenced block only</text>
  <text x="650" y="362" font-size="10.5" fill="#6b7280">Hard limit: 2 spawns per step</text>
  <text x="650" y="380" font-size="10.5" fill="#6b7280">Invisible to io · ETA +5 min</text>
  <text x="650" y="398" font-size="10" fill="#ef4444">After 2 spawns: escalate to io</text>

  <!-- Context limits -->
  <rect x="840" y="262" width="190" height="148" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="860" y="284" font-size="11" font-weight="700" fill="#374151" letter-spacing="0.05em">CONTEXT LIMITS</text>
  <line x1="860" y1="290" x2="1010" y2="290" stroke="#e5e7eb" stroke-width="1"/>
  <text x="860" y="310" font-size="10.5" fill="#6b7280">Polo   131k  ⚠ flag at 55%</text>
  <text x="860" y="330" font-size="10.5" fill="#6b7280">Cato   131k  flag at 70%</text>
  <text x="860" y="350" font-size="10.5" fill="#6b7280">io     1M    flag at 80%</text>
  <text x="860" y="370" font-size="10.5" fill="#6b7280">CC     200k  built-in</text>
  <text x="860" y="390" font-size="10.5" fill="#6b7280">codo   163k  single-shot</text>

  <!-- Escalation ladder -->
  <rect x="630" y="428" width="400" height="376" rx="10" fill="white" stroke="#fecaca" stroke-width="1.5"/>
  <text x="650" y="452" font-size="11" font-weight="700" fill="#dc2626" letter-spacing="0.06em">⚠  ESCALATION LADDER  (io → CC)</text>
  <line x1="650" y1="460" x2="1010" y2="460" stroke="#fecaca" stroke-width="1"/>

  <rect x="640" y="468" width="380" height="44" rx="5" fill="#fef2f2"/>
  <text x="654" y="486" font-size="10.5" font-weight="700" fill="#dc2626">Health check fails</text>
  <text x="654" y="502" font-size="10" fill="#6b7280">Retry once (10s). No response → to-cc.md + sermo immediately.</text>

  <rect x="640" y="518" width="380" height="44" rx="5" fill="#fef2f2"/>
  <text x="654" y="536" font-size="10.5" font-weight="700" fill="#dc2626">ETA+15, no events received</text>
  <text x="654" y="552" font-size="10" fill="#6b7280">One ping. No response → escalate. Critical-path: skip ETA+30.</text>

  <rect x="640" y="568" width="380" height="44" rx="5" fill="#fff7ed"/>
  <text x="654" y="586" font-size="10.5" font-weight="700" fill="#c2410c">ETA+30</text>
  <text x="654" y="602" font-size="10" fill="#6b7280">Sermo post + to-cc.md blocker + task brief to polo-inbox.md.</text>

  <rect x="640" y="618" width="380" height="44" rx="5" fill="#fef2f2"/>
  <text x="654" y="636" font-size="10.5" font-weight="700" fill="#dc2626">error retries:2 / blocked</text>
  <text x="654" y="652" font-size="10" fill="#6b7280">Escalate immediately. No 3rd retry without explicit CC auth.</text>

  <rect x="640" y="668" width="380" height="44" rx="5" fill="#f0fdf4"/>
  <text x="654" y="686" font-size="10.5" font-weight="700" fill="#15803d">phase_complete</text>
  <text x="654" y="702" font-size="10" fill="#6b7280">Post to to-cc.md. CIV gate: wait for CC ack before next step.</text>

  <rect x="640" y="718" width="380" height="44" rx="5" fill="#f8fafc"/>
  <text x="654" y="736" font-size="10.5" font-weight="700" fill="#374151">CC silent &gt;30 min</text>
  <text x="654" y="752" font-size="10" fill="#6b7280">io posts sermo and waits. Does not self-authorize write tasks.</text>

  <!-- ── EVENT SCHEMA (bottom) ─────────────────────── -->
  <rect x="80" y="794" width="520" height="50" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="100" y="814" font-size="10" font-weight="700" fill="#374151" letter-spacing="0.05em">EVENT SCHEMA  (Polo → io-inbox.md · one JSON line per event)</text>
  <text x="100" y="832" font-size="9.5" fill="#6b7280" font-family="Menlo,monospace">{"ts":"ISO8601","task_id":"task-YYYYMMDD-NNN","step":N,"total":N,"status":"started|done|error|heartbeat|phase_complete|blocked","msg":"..."}</text>

</svg>

</body>
</html>
