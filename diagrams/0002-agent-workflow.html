<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Workflow Diagram</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            padding: 40px;
            margin: 0;
        }
        .canvas {
            position: relative;
            width: 900px;
            height: 700px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .node {
            position: absolute;
            padding: 15px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.1);
            z-index: 2;
        }
        .node-human { background-color: #ffe5ec; color: #d63384; top: 50px; left: 400px; }
        .node-cc { background-color: #e0f2fe; color: #0369a1; top: 150px; left: 400px; }
        .node-io { background-color: #fef3c7; color: #b45309; top: 250px; left: 400px; }
        .node-polo { background-color: #dcfce7; color: #15803d; top: 350px; left: 400px; }
        .node-codo { background-color: #f3e8ff; color: #7e22ce; top: 350px; left: 650px; }
        
        .node-file { 
            background-color: #f1f5f9; 
            color: #475569; 
            font-style: italic; 
            font-size: 0.9em;
            border: 1px dashed #cbd5e1;
        }
        .file-io { top: 350px; left: 150px; }
        .file-polo { top: 450px; left: 150px; }
        .file-cc { top: 250px; left: 150px; }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .arrow {
            stroke: #94a3b8;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead);
        }
        .arrow-escalation {
            stroke: #ef4444;
            stroke-width: 2;
            stroke-dasharray: 5,5;
            fill: none;
            marker-end: url(#arrowhead-red);
        }
        .label {
            font-size: 11px;
            fill: #64748b;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <!-- Nodes -->
        <div class="node node-human">Martin (Human)</div>
        <div class="node node-cc">CC (Architect)</div>
        <div class="node node-io">io (Orchestrator)</div>
        <div class="node node-polo">Polo (Executor)</div>
        <div class="node node-codo">codo (Coder)</div>
        
        <div class="node node-file file-cc">to-cc.md</div>
        <div class="node node-file file-io">io-inbox.md</div>
        <div class="node node-file file-polo">polo-inbox.md</div>

        <svg>
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
                </marker>
                <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
                </marker>
            </defs>
            
            <!-- Flow -->
            <path d="M 450 100 L 450 150" class="arrow" />
            <text x="455" y="125" class="label">Assigns Task</text>
            
            <path d="M 400 180 L 250 250" class="arrow" />
            <text x="300" y="210" class="label">Requirements Doc</text>
            
            <path d="M 250 270 L 400 270" class="arrow" />
            <text x="300" y="265" class="label">Orchestrates</text>
            
            <path d="M 450 290 L 450 350" class="arrow" />
            <text x="455" y="320" class="label">Task Brief + ETA</text>
            
            <path d="M 500 370 L 650 370" class="arrow" />
            <text x="520" y="365" class="label">Coding Brief</text>
            
            <path d="M 650 390 L 500 390" class="arrow" />
            <text x="520" y="405" class="label">Code Block</text>
            
            <path d="M 400 370 L 250 370" class="arrow" />
            <text x="270" y="365" class="label">JSON Progress</text>
            
            <path d="M 250 390 L 400 280" class="arrow" />
            <text x="270" y="330" class="label">Watchdog Poll</text>
            
            <path d="M 400 260 L 250 260" class="arrow" />
            <text x="270" y="255" class="label">Phase Complete</text>
            
            <path d="M 250 240 L 400 170" class="arrow" />
            <text x="270" y="200" class="label">Review Result</text>
            
            <path d="M 450 150 L 450 100" class="arrow" />
            <text x="455" y="125" class="label">Final Output</text>
            
            <!-- Escalation -->
            <path d="M 400 270 L 300 270 L 300 180 L 400 180" class="arrow-escalation" />
            <text x="260" y="220" class="label" style="fill: #ef4444;">Escalation Path</text>
            
            <path d="M 400 170 L 300 170 L 300 100 L 400 100" class="arrow-escalation" />
            <text x="260" y="130" class="label" style="fill: #ef4444;">Critical Alert</text>
        </svg>
    </div>
</body>
</html>
