<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diagrams</title>
<style>
  body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #fff; color: #222; }
  h1 { font-size: 1.2rem; margin-bottom: 1.5rem; }
  ol { padding-left: 1.5rem; }
  li { margin: 0.5rem 0; }
  a { color: #0066cc; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .err { color: #c00; }
</style>
</head>
<body>
<h1>Diagrams</h1>
<ol id="list"></ol>
<script>
fetch('https://api.github.com/repos/spiral-cmd/spiral-cmd.github.io/contents/diagrams')
  .then(r => r.json())
  .then(files => {
    const ol = document.getElementById('list');
    files
      .filter(f => f.name !== 'index.html')
      .sort((a, b) => b.name.localeCompare(a.name))
      .forEach(f => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = f.name;
        a.textContent = f.name.replace(/\.html$/, '').replace(/-/g, ' ');
        li.appendChild(a);
        ol.appendChild(li);
      });
  })
  .catch(() => {
    document.getElementById('list').innerHTML = '<li class="err">Failed to load file list.</li>';
  });
</script>
</body>
</html>
