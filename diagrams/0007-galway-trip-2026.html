<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galway Trip — Jul/Aug 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; color: #1a1a2e; padding: 20px; }
  .container { max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 4px; color: #16213e; }
  .subtitle { color: #555; font-size: 0.9rem; margin-bottom: 20px; }
  .legend { display: flex; gap: 20px; margin-bottom: 16px; font-size: 0.85rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .legend-dot.travel { background: #2563eb; }
  .legend-dot.galway { background: #16a34a; }
  .legend-dot.personal { background: #eab308; }
  .legend-dot.flight { background: #8b5cf6; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day-header { text-align: center; font-weight: 600; font-size: 0.8rem; color: #666; padding: 6px 0; }
  .day-cell { background: white; border-radius: 8px; padding: 8px; min-height: 100px; border: 1px solid #e2e8f0; }
  .day-cell.empty { background: transparent; border: none; min-height: 0; }
  .day-cell.other-month { opacity: 0.4; }
  .day-number { font-weight: 600; font-size: 0.85rem; color: #333; margin-bottom: 4px; }
  .day-cell.today .day-number { background: #2563eb; color: white; display: inline-block; padding: 1px 7px; border-radius: 50%; }
  .event { display: block; font-size: 0.7rem; padding: 3px 5px; margin-bottom: 3px; border-radius: 4px; background: #dbeafe; color: #1e40af; border-left: 3px solid #2563eb; text-decoration: none; transition: transform 0.1s, box-shadow 0.1s; }
  .event:hover { transform: scale(1.03); box-shadow: 0 2px 6px rgba(37,99,235,0.2); }
  .event .loc { display: block; font-size: 0.65rem; color: #555; }
  .event.galway { background: #dcfce7; color: #166534; border-left-color: #16a34a; }
  .event.galway .loc { color: #15803d; }
  .event.personal { background: #fef9c3; color: #854d0e; border-left-color: #eab308; }
  .event.personal .loc { color: #a16207; }
  .event.flight { background: #ede9fe; color: #5b21b6; border-left-color: #8b5cf6; }
  .event.flight .loc { color: #6d28d9; }
  .summary { margin-top: 16px; background: white; border-radius: 8px; padding: 14px; border: 1px solid #e2e8f0; }
  .summary h3 { font-size: 0.95rem; margin-bottom: 8px; }
  .summary ul { list-style: none; font-size: 0.85rem; }
  .summary li { padding: 3px 0; }
  .summary .count { font-weight: 600; color: #2563eb; }
  @media (max-width: 700px) {
    .calendar-grid { grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .day-cell { min-height: 70px; padding: 4px; }
    .event { font-size: 0.6rem; padding: 2px 3px; }
    .day-number { font-size: 0.75rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🇮🇪 Galway Trip</h1>
  <p class="subtitle">Staying with Bridie at Clifden 356 Sky Road · 25 Jul – 1 Aug 2026</p>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot travel"></span> Travel</div>
    <div class="legend-item"><span class="legend-dot galway"></span> In Galway</div>
    <div class="legend-item"><span class="legend-dot personal"></span> Personal</div>
    <div class="legend-item"><span class="legend-dot flight"></span> Martin's Flights</div>
  </div>

  <div class="calendar-grid" id="calendar"></div>

  <div class="summary" id="summary"></div>
</div>

<script>
const events = [
  { name: "Last day KFS", date: "2026-07-24", type: "personal" },
  { name: "Travel to Galway", date: "2026-07-25", type: "travel" },
  { name: "Clifden 356 Sky Road", loc: "Check-in from 5pm", date: "2026-07-25", type: "galway" },
  { name: "Galway", date: "2026-07-26", type: "galway" },
  { name: "Martin flies in", loc: "LTN→DUB 12:25-13:45 FR339", date: "2026-07-27", type: "flight" },
  { name: "Galway", date: "2026-07-27", type: "galway" },
  { name: "Galway", date: "2026-07-28", type: "galway" },
  { name: "Galway", date: "2026-07-29", type: "galway" },
  { name: "Galway", date: "2026-07-30", type: "galway" },
  { name: "Galway", date: "2026-07-31", type: "galway" },
  { name: "Check-out", loc: "Before 10am", date: "2026-08-01", type: "travel" },
  { name: "Travel home", date: "2026-08-01", type: "travel" },
  { name: "Martin flies home", loc: "DUB→LTN 14:10-15:25 FR340", date: "2026-08-10", type: "flight" }
];

const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function buildCalendar() {
  const grid = document.getElementById("calendar");
  const summary = document.getElementById("summary");

  dayNames.forEach(d => {
    const h = document.createElement("div");
    h.className = "day-header";
    h.textContent = d;
    grid.appendChild(h);
  });

  // Show w/c 20 Jul 2026 through to 10 Aug 2026
  const firstDay = new Date(2026, 6, 20);
  const endGrid = new Date(2026, 7, 10);

  let d = new Date(firstDay);
  while (d <= endGrid) {
    const cell = document.createElement("div");
    cell.className = "day-cell";

    const num = document.createElement("div");
    num.className = "day-number";
    num.textContent = d.getDate();
    cell.appendChild(num);

    const today = new Date();
    if (d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth() && d.getDate() === today.getDate()) {
      cell.classList.add("today");
    }

    const dateStr = fmtDate(d);

    // Events for this day
    const dayEvents = events.filter(e => e.date === dateStr);
    dayEvents.forEach(e => {
      const div = document.createElement("div");
      div.className = "event " + e.type;
      if (e.loc) {
        div.innerHTML = `${e.name} <span class="loc">${e.loc}</span>`;
      } else {
        div.textContent = e.name;
      }
      cell.appendChild(div);
    });

    grid.appendChild(cell);
    d.setDate(d.getDate() + 1);
  }

  // Summary
  const tripStart = new Date(2026, 6, 25);
  const tripEnd = new Date(2026, 7, 1);
  const nights = Math.round((tripEnd - tripStart) / (1000 * 60 * 60 * 24));
  let html = `<h3>📋 Summary — <span class="count">${nights} nights</span> at Clifden 356 Sky Road</h3><ul>`;
  html += `<li><strong>Sat 25 Jul</strong> — Travel to Galway · Check-in from 5pm</li>`;
  html += `<li><strong>Mon 27 Jul</strong> — Martin flies in: Luton→Dublin 12:25-13:45 (FR339)</li>`;
  html += `<li><strong>Sat 1 Aug</strong> — Check-out before 10am · Travel home</li>`;
  html += `<li><strong>Mon 10 Aug</strong> — Martin flies home: Dublin→Luton 14:10-15:25 (FR340)</li>`;
  html += `<li><strong>Location:</strong> Clifden 356 Sky Road, Eyrephort, Co. Galway</li>`;
  html += `<li><strong>Staying with:</strong> Bridie & Charles-Antoine</li>`;
  html += `<li><strong>Booking ref:</strong> Connemara Coastal Cottages (Emer Mc Namara)</li>`;
  html += `</ul>`;
  summary.innerHTML = html;
}

buildCalendar();
</script>
</body>
</html>
