<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amir Hossein — Arrival & Stay Calendar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; color: #1a1a2e; padding: 20px; }
  .container { max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 1.6rem; margin-bottom: 4px; color: #16213e; }
  .subtitle { color: #555; font-size: 0.9rem; margin-bottom: 20px; }
  .legend { display: flex; gap: 20px; margin-bottom: 16px; font-size: 0.85rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .legend-dot.arrival { background: #059669; }
  .legend-dot.stay { background: #dbeafe; border: 2px solid #2563eb; }
  .legend-dot.nigel { background: #f59e0b; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day-header { text-align: center; font-weight: 600; font-size: 0.8rem; color: #666; padding: 6px 0; }
  .day-cell { background: white; border-radius: 8px; padding: 8px; min-height: 100px; border: 1px solid #e2e8f0; }
  .day-cell.empty { background: transparent; border: none; min-height: 0; }
  .day-cell.other-month { opacity: 0.4; }
  .day-number { font-weight: 600; font-size: 0.85rem; color: #333; margin-bottom: 4px; }
  .day-cell.today .day-number { background: #2563eb; color: white; display: inline-block; padding: 1px 7px; border-radius: 50%; }
  .event { display: block; font-size: 0.7rem; padding: 3px 5px; margin-bottom: 3px; border-radius: 4px; text-decoration: none; }
  .event.arrival { background: #d1fae5; color: #065f46; border-left: 3px solid #059669; }
  .event.stay { background: #dbeafe; color: #1e40af; border-left: 3px solid #2563eb; }
  .event.nigel { background: #fef3c7; color: #92400e; border-left: 3px solid #f59e0b; }
  .event .sub { display: block; font-size: 0.65rem; opacity: 0.8; }
  .summary { margin-top: 16px; background: white; border-radius: 8px; padding: 14px; border: 1px solid #e2e8f0; }
  .summary h3 { font-size: 0.95rem; margin-bottom: 8px; }
  .summary ul { list-style: none; font-size: 0.85rem; }
  .summary li { padding: 3px 0; }
  .summary .count { font-weight: 600; color: #2563eb; }
  @media (max-width: 700px) {
    .calendar-grid { grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .day-cell { min-height: 70px; padding: 4px; }
    .event { font-size: 0.6rem; padding: 2px 3px; }
    .day-number { font-size: 0.75rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>✈️ Amir Hossein — Arrival & Stay</h1>
  <p class="subtitle">Arriving 23 Jun 2026 · Staying at 31 Glasslyn Road, London N8</p>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot arrival"></span> Arrival</div>
    <div class="legend-item"><span class="legend-dot stay"></span> Stay at Hibernia</div>
    <div class="legend-item"><span class="legend-dot nigel"></span> Nigel overlap (tentative)</div>
  </div>

  <div class="calendar-grid" id="calendar"></div>

  <div class="summary" id="summary"></div>
</div>

<script>
const events = [
  { type: "arrival", label: "✈️ Amir arrives", date: "2026-06-23" },
  { type: "stay", label: "Amir at 31g", date: "2026-06-23" },
  { type: "stay", label: "Amir at 31g", date: "2026-06-24" },
  { type: "stay", label: "Amir at 31g", date: "2026-06-25" },
  { type: "stay", label: "Amir at 31g", date: "2026-06-26" },
  { type: "stay", label: "Amir at 31g", date: "2026-06-27" },
  { type: "stay", label: "Amir at 31g", date: "2026-06-28" },
  { type: "stay", label: "Amir at 31g", date: "2026-06-29" },
  { type: "stay", label: "Amir at 31g", date: "2026-06-30" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-01" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-02" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-03" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-04" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-05" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-06" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-07" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-08" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-09" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-10" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-11" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-12" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-13" },
  { type: "stay", label: "Amir at 31g", date: "2026-07-14" },
  { type: "nigel", label: "Nigel stay (tentative)", date: "2026-07-14" },
  { type: "nigel", label: "Nigel stay (tentative)", date: "2026-07-15" },
  { type: "nigel", label: "Nigel stay (tentative)", date: "2026-07-16" },
  { type: "nigel", label: "Nigel stay (tentative)", date: "2026-07-17" },
  { type: "nigel", label: "Nigel stay (tentative)", date: "2026-07-18" },
  { type: "nigel", label: "Nigel stay (tentative)", date: "2026-07-19" },
  { type: "nigel", label: "Nigel stay (tentative)", date: "2026-07-20" },
  { type: "nigel", label: "Nigel stay (tentative)", date: "2026-07-21" }
];

const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function buildCalendar() {
  const grid = document.getElementById("calendar");
  const summary = document.getElementById("summary");

  dayNames.forEach(d => {
    const h = document.createElement("div");
    h.className = "day-header";
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstDay = new Date(2026, 5, 1);
  const endGrid = new Date(2026, 6, 31);
  const windowStart = new Date(2026, 5, 1);
  const windowEnd = new Date(2026, 6, 31);

  let d = new Date(firstDay);
  while (d <= endGrid) {
    const cell = document.createElement("div");
    cell.className = "day-cell";

    const inRange = d >= windowStart && d <= windowEnd;
    if (!inRange) cell.classList.add("other-month");

    const num = document.createElement("div");
    num.className = "day-number";
    num.textContent = d.getDate();
    cell.appendChild(num);

    const today = new Date();
    if (d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth() && d.getDate() === today.getDate()) {
      cell.classList.add("today");
    }

    const dateStr = fmtDate(d);
    const dayEvents = events.filter(e => e.date === dateStr);
    dayEvents.forEach(e => {
      const el = document.createElement("div");
      el.className = `event ${e.type}`;
      el.textContent = e.label;
      cell.appendChild(el);
    });

    grid.appendChild(cell);
    d.setDate(d.getDate() + 1);
  }

  const arrivalDate = new Date(2026, 5, 23);
  const dayIdx = arrivalDate.getDay() === 0 ? 6 : arrivalDate.getDay() - 1;
  const dayName = dayNames[dayIdx];
  const stayCount = events.filter(e => e.type === "stay").length;
  const nigelCount = events.filter(e => e.type === "nigel").length;

  let html = `<h3>📋 Summary</h3><ul>`;
  html += `<li>✈️ <strong>Amir arrives: ${dayName} 23 Jun 2026</strong></li>`;
  html += `<li>🏠 <strong>${stayCount} days</strong> at 31 Glasslyn Road (23 Jun – 14 Jul)</li>`;
  html += `<li>🔄 <strong>Nigel overlap:</strong> ~${nigelCount} days tentative from ~14 Jul (a couple/three weeks after Amir arrives)</li>`;
  html += `<li>📍 London N8 8RJ</li>`;
  html += `</ul>`;
  summary.innerHTML = html;
}

buildCalendar();
</script>
</body>
</html>
