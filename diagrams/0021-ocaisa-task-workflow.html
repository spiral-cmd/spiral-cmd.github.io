<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ocaisa task workflow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FFFFFF;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    padding: 60px 20px;
  }
  svg { overflow: visible; }

  .node-ink { fill: #1A1A18; }
  .node-ink text { fill: #FFFFFF; }
  .node-white { fill: #FFFFFF; stroke: #1A1A18; stroke-width: 1.5px; }
  .node-white text { fill: #1A1A18; }
  .node-coral { fill: #FAECE7; stroke: #C25C3A; stroke-width: 1.5px; }
  .node-coral text { fill: #7A3520; }
  .node-blue { fill: #E6F1FB; stroke: #4A7AB5; stroke-width: 1.5px; }
  .node-blue text { fill: #185FA5; }
  .node-olive { fill: #EAF3DE; stroke: #6A7A3A; stroke-width: 1.5px; }
  .node-olive text { fill: #3B6D11; }

  .node-label { font-size: 14px; font-weight: 600; }
  .role-label { font-size: 12px; font-style: italic; fill: #9A9890; }
  .annotation { font-size: 12px; font-style: italic; fill: #9A9890; }
  .section-header { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; fill: #9A9890; }
  .task-label { font-size: 11px; font-weight: 400; letter-spacing: 0.08em; fill: #6A7A3A; }

  .arrow { fill: #1A1A18; }
  .arrow-ghost { fill: #9A9890; }
</style>
</head>
<body>
<svg width="1100" height="2100" viewBox="0 0 1100 2100">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path class="arrow" d="M 0 0 L 10 5 L 0 10 Z"/>
    </marker>
    <marker id="arrow-ghost" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path class="arrow-ghost" d="M 0 0 L 10 5 L 0 10 Z"/>
    </marker>
    <marker id="arrow-rev" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path class="arrow" d="M 10 0 L 0 5 L 10 10 Z"/>
    </marker>
  </defs>

  <!-- ===== SECTION 1: AGENT HIERARCHY ===== -->
  <text x="550" y="40" text-anchor="middle" class="section-header">AGENT HIERARCHY</text>

  <!-- CC -->
  <rect x="425" y="60" width="250" height="56" rx="10" class="node-ink"/>
  <text x="550" y="86" text-anchor="middle" class="node-label" fill="#FFFFFF">cc</text>
  <text x="550" y="104" text-anchor="middle" class="role-label" fill="#CCCCCC">architect — plans, designs, validates</text>

  <!-- Arrow CC → io -->
  <line x1="550" y1="116" x2="550" y2="160" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="560" y="142" class="annotation">tasks / requirements</text>

  <!-- io -->
  <rect x="425" y="165" width="250" height="56" rx="10" class="node-coral"/>
  <text x="550" y="191" text-anchor="middle" class="node-label">io</text>
  <text x="550" y="209" text-anchor="middle" class="role-label" fill="#9A9890">orchestrator — briefs, monitors, gates</text>

  <!-- Arrow io → Polo -->
  <line x1="550" y1="221" x2="550" y2="265" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="560" y="247" class="annotation">briefs / instructions</text>

  <!-- Polo -->
  <rect x="425" y="270" width="250" height="56" rx="10" class="node-blue"/>
  <text x="550" y="296" text-anchor="middle" class="node-label">polo</text>
  <text x="550" y="314" text-anchor="middle" class="role-label" fill="#9A9890">executor — runs scripts, edits files</text>

  <!-- Arrow Polo → codo -->
  <line x1="550" y1="326" x2="550" y2="370" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="560" y="352" class="annotation">coding briefs (new code &gt;20 lines)</text>

  <!-- codo -->
  <rect x="425" y="375" width="250" height="56" rx="10" class="node-olive"/>
  <text x="550" y="401" text-anchor="middle" class="node-label">codo</text>
  <text x="550" y="419" text-anchor="middle" class="role-label" fill="#9A9890">code generation — returns fenced code block</text>

  <!-- Delegation rule annotation -->
  <text x="550" y="460" text-anchor="middle" class="annotation">delegation rule: cc → io → polo — never skip a layer</text>

  <!-- ===== SECTION 2: TASK LIFECYCLE ===== -->
  <text x="550" y="520" text-anchor="middle" class="section-header">TASK LIFECYCLE</text>

  <!-- Phase 1: Martin briefs CC -->
  <rect x="100" y="540" width="900" height="70" rx="10" fill="none" stroke="#1A1A18" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="560" class="task-label">PHASE 1 — MARTIN BRIEFS CC</text>
  <text x="120" y="582" class="annotation">martin talks to agents and then briefs cc — defines the problem, desired outcome, constraints</text>
  <text x="120" y="602" class="annotation">cc listens, asks clarifying questions, captures the brief in structured form</text>

  <!-- Arrow -->
  <line x1="550" y1="610" x2="550" y2="645" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: CC + Martin joint definition — chunking + evals -->
  <rect x="100" y="650" width="900" height="110" rx="10" fill="none" stroke="#1A1A18" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="670" class="task-label">PHASE 2 — CC + MARTIN JOINT DEFINITION (CHUNKING)</text>
  <text x="120" y="692" class="annotation">cc and martin jointly craft how the service/product works</text>
  <text x="120" y="712" class="annotation">cc proposes work packages (wps) — numbered chunks of work with scope, deliverables, dependencies</text>
  <text x="120" y="732" class="annotation">cc proposes evals — verifiable checks per wp (specific commands, queries, outputs)</text>
  <text x="120" y="752" class="annotation">io reviews wps and evals, discusses with cc — this is the "chunking" conversation</text>

  <!-- Arrow -->
  <line x1="550" y1="760" x2="550" y2="795" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3: CC defines task -->
  <rect x="100" y="800" width="900" height="90" rx="10" fill="none" stroke="#1A1A18" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="820" class="task-label">PHASE 3 — CC DEFINES TASK</text>
  <text x="120" y="842" class="annotation">cc writes task to backlog.sqlite with: task id, description, priority, critical-path flag, correlation id</text>
  <text x="120" y="862" class="annotation">cc briefs io via sessions_send with ETA contract: task name, critical-path, success criteria, ETA, check-in cadence</text>
  <text x="120" y="882" class="annotation">cc posts sermo: [cc] delegated &lt;task-id&gt; to io (eta: &lt;time&gt;, critical: yes/no)</text>

  <!-- Arrow -->
  <line x1="550" y1="890" x2="550" y2="925" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 4: io health check -->
  <rect x="100" y="930" width="900" height="70" rx="10" fill="none" stroke="#1A1A18" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="950" class="task-label">PHASE 4 — IO HEALTH CHECK (HARD RULE)</text>
  <text x="120" y="972" class="annotation">io pings polo via sessions_send to agent:main:main with 15s timeout</text>
  <text x="120" y="992" class="annotation">only a ping response confirms polo alive — sermo activity does not substitute</text>

  <!-- Arrow -->
  <line x1="550" y1="1000" x2="550" y2="1035" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 5: io briefs Polo -->
  <rect x="100" y="1040" width="900" height="70" rx="10" fill="none" stroke="#1A1A18" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="1060" class="task-label">PHASE 5 — IO BRIEFS POLO</text>
  <text x="120" y="1082" class="annotation">io sends brief via sessions_send to agent:main:main with ETA contract</text>
  <text x="120" y="1102" class="annotation">polo emits started event to io-inbox.md within 10 min of receipt</text>

  <!-- Arrow -->
  <line x1="550" y1="1110" x2="550" y2="1145" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 6: Execution -->
  <rect x="100" y="1150" width="900" height="130" rx="10" fill="none" stroke="#1A1A18" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="1170" class="task-label">PHASE 6 — EXECUTION</text>
  <text x="120" y="1192" class="annotation">polo executes task step by step, emitting structured events to io-inbox.md for each step</text>
  <text x="120" y="1212" class="annotation">if new code &gt;20 lines: polo spawns codo via sessions_spawn with self-contained coding brief</text>
  <text x="120" y="1232" class="annotation">codo returns one fenced code block — no prose, no questions. max 2 spawns per task</text>
  <text x="120" y="1252" class="annotation">long steps (&gt;5 min): polo emits heartbeat every 5 min with progress</text>
  <text x="120" y="1272" class="annotation">on failure: polo emits error with retries count. after 2 retries: emits blocked and stops</text>

  <!-- Arrow -->
  <line x1="550" y1="1280" x2="550" y2="1315" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 7: io watchdog -->
  <rect x="100" y="1320" width="900" height="90" rx="10" fill="none" stroke="#1A1A18" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="1340" class="task-label">PHASE 7 — IO WATCHDOG (POLLS EVERY 5 MIN)</text>
  <text x="120" y="1362" class="annotation">latest event &gt;10 min ago and not done → check-in to polo-inbox.md</text>
  <text x="120" y="1382" class="annotation">latest event &gt;20 min ago, no response → escalate to cc via mailbox + sermo</text>
  <text x="120" y="1402" class="annotation">error with retries:2 or blocked → escalate immediately to cc</text>

  <!-- Arrow -->
  <line x1="550" y1="1410" x2="550" y2="1445" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 8: CIV Gate -->
  <rect x="100" y="1450" width="900" height="90" rx="10" fill="none" stroke="#1A1A18" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="1470" class="task-label">PHASE 8 — CIV GATE (CC VERIFICATION)</text>
  <text x="120" y="1492" class="annotation">polo emits phase_complete → io writes to mailbox.sqlite for cc review</text>
  <text x="120" y="1512" class="annotation">cc reviews and responds — io does NOT send next instruction until cc acknowledges</text>
  <text x="120" y="1532" class="annotation">if cc silent &gt;30 min: io posts sermo and waits — no self-authorization</text>

  <!-- Arrow -->
  <line x1="550" y1="1540" x2="550" y2="1575" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 9: Completion -->
  <rect x="100" y="1580" width="900" height="70" rx="10" fill="none" stroke="#1A1A18" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="1600" class="task-label">PHASE 9 — COMPLETION</text>
  <text x="120" y="1622" class="annotation">polo emits done → io posts sermo: [io] polo completed &lt;task-id&gt;: &lt;result&gt;</text>
  <text x="120" y="1642" class="annotation">io updates polo-active-tasks.md — marks task ✅</text>

  <!-- Arrow -->
  <line x1="550" y1="1650" x2="550" y2="1685" stroke="#1A1A18" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 10: Retro -->
  <rect x="100" y="1690" width="900" height="70" rx="10" fill="none" stroke="#1A1A18" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="120" y="1710" class="task-label">PHASE 10 — RETRO</text>
  <text x="120" y="1732" class="annotation">all agents write up thoughts about the project via notion page under [project name]</text>
  <text x="120" y="1752" class="annotation">child page of Dev (36fa9823ea2a804b827cdda9409a26a9)</text>

  <!-- ===== SECTION 3: COMMUNICATION CHANNELS ===== -->
  <text x="550" y="1810" text-anchor="middle" class="section-header">COMMUNICATION CHANNELS</text>

  <rect x="60" y="1830" width="220" height="40" rx="10" class="node-white"/>
  <text x="170" y="1856" text-anchor="middle" class="node-label">cc → io</text>
  <text x="170" y="1880" text-anchor="middle" class="annotation">sessions_send (uuid)</text>

  <rect x="310" y="1830" width="220" height="40" rx="10" class="node-white"/>
  <text x="420" y="1856" text-anchor="middle" class="node-label">io → polo</text>
  <text x="420" y="1880" text-anchor="middle" class="annotation">sessions_send</text>

  <rect x="560" y="1830" width="220" height="40" rx="10" class="node-white"/>
  <text x="670" y="1856" text-anchor="middle" class="node-label">polo → io</text>
  <text x="670" y="1880" text-anchor="middle" class="annotation">sessions_send + io-inbox.md</text>

  <rect x="810" y="1830" width="220" height="40" rx="10" class="node-white"/>
  <text x="920" y="1856" text-anchor="middle" class="node-label">→ cc</text>
  <text x="920" y="1880" text-anchor="middle" class="annotation">mailbox.sqlite + signal</text>

  <rect x="60" y="1885" width="220" height="40" rx="10" class="node-white"/>
  <text x="170" y="1911" text-anchor="middle" class="node-label">polo → codo</text>
  <text x="170" y="1935" text-anchor="middle" class="annotation">sessions_spawn only</text>

  <rect x="310" y="1885" width="220" height="40" rx="10" class="node-white"/>
  <text x="420" y="1911" text-anchor="middle" class="node-label">all → martin</text>
  <text x="420" y="1935" text-anchor="middle" class="annotation">sermo (topic 111)</text>

  <rect x="560" y="1885" width="220" height="40" rx="10" class="node-white"/>
  <text x="670" y="1911" text-anchor="middle" class="node-label">mirror</text>
  <text x="670" y="1935" text-anchor="middle" class="annotation">topic 10 (pace notation)</text>

  <!-- Footer with generous whitespace below -->
  <text x="550" y="2000" text-anchor="middle" class="section-header">OCAISA TASK WORKFLOW — A2A BIBLE V2026-05-26</text>

</svg>
</body>
</html>
