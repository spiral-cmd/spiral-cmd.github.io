<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0033 — Codex Ingestion Pipeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8f9fa; color: #222; padding: 32px 24px; }
  h1 { font-size: 1.1rem; font-weight: 600; color: #333; margin-bottom: 4px; text-align: center; }
  .meta { font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 28px; }

  /* SVG node styles */
  svg .box { fill: #f1efea; stroke: #b4b2a9; }
  svg .arr { stroke: #888780; fill: none; stroke-width: 1.5; }
  svg .leader { stroke: #b4b2a9; fill: none; stroke-width: 0.5; stroke-dasharray: 4 3; }
  svg .t   { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3d3d3a; }
  svg .ts  { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #73726c; }
  svg .th  { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #3d3d3a; }
  svg .node { cursor: pointer; }
  svg .node:hover rect { opacity: 0.85; }

  /* Color ramps — light mode */
  svg .c-gray rect  { fill: #f1efea; stroke: #888780; }
  svg .c-gray .th, svg .c-gray .t { fill: #444441; }
  svg .c-gray .ts   { fill: #5f5e5a; }

  svg .c-teal rect  { fill: #e1f5ee; stroke: #0f6e56; }
  svg .c-teal .th, svg .c-teal .t { fill: #085041; }
  svg .c-teal .ts   { fill: #0f6e56; }

  svg .c-purple rect { fill: #eeedfe; stroke: #534ab7; }
  svg .c-purple .th, svg .c-purple .t { fill: #3c3489; }
  svg .c-purple .ts  { fill: #534ab7; }

  svg .c-blue rect  { fill: #e6f1fb; stroke: #185fa5; }
  svg .c-blue .th, svg .c-blue .t { fill: #0c447c; }
  svg .c-blue .ts   { fill: #185fa5; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #c2c0b6; }
    h1 { color: #c2c0b6; }
    .meta { color: #73726c; }

    svg .arr { stroke: #73726c; }
    svg .t   { fill: #c2c0b6; }
    svg .ts  { fill: #9c9a92; }
    svg .th  { fill: #c2c0b6; }

    svg .c-gray rect  { fill: #444441; stroke: #888780; }
    svg .c-gray .th, svg .c-gray .t { fill: #d3d1c7; }
    svg .c-gray .ts   { fill: #b4b2a9; }

    svg .c-teal rect  { fill: #085041; stroke: #5dcaa5; }
    svg .c-teal .th, svg .c-teal .t { fill: #9fe1cb; }
    svg .c-teal .ts   { fill: #5dcaa5; }

    svg .c-purple rect { fill: #3c3489; stroke: #afa9ec; }
    svg .c-purple .th, svg .c-purple .t { fill: #cecbf6; }
    svg .c-purple .ts  { fill: #afa9ec; }

    svg .c-blue rect  { fill: #0c447c; stroke: #85b7eb; }
    svg .c-blue .th, svg .c-blue .t { fill: #b5d4f4; }
    svg .c-blue .ts   { fill: #85b7eb; }
  }
</style>
</head>
<body>
<h1>Codex ingestion pipeline</h1>
<p class="meta">_Author: CC · Date: 2026-06-16_</p>

<svg width="100%" viewBox="0 0 680 542" role="img">
  <title>Codex ingestion pipeline</title>
  <desc>Top-to-bottom pipeline: pdf-in directory → pdftotext extraction → tag-learn → chunk + embed → codex.db → codex_apply.py</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g class="node c-gray">
    <rect x="200" y="40" width="280" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="61" text-anchor="middle" dominant-baseline="central">pdf-in directory</text>
    <text class="ts" x="340" y="79" text-anchor="middle" dominant-baseline="central">launchd WatchPaths — event-driven</text>
  </g>

  <line x1="340" y1="92" x2="340" y2="122" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-teal">
    <rect x="200" y="122" width="280" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="143" text-anchor="middle" dominant-baseline="central">pdftotext extraction</text>
    <text class="ts" x="340" y="161" text-anchor="middle" dominant-baseline="central">PDFs only · no OCR fallback</text>
  </g>

  <line x1="340" y1="174" x2="340" y2="204" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-purple">
    <rect x="200" y="204" width="280" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="225" text-anchor="middle" dominant-baseline="central">tag-learn</text>
    <text class="ts" x="340" y="243" text-anchor="middle" dominant-baseline="central">extract + assign · 43 tags</text>
  </g>

  <line x1="340" y1="256" x2="340" y2="286" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-teal">
    <rect x="200" y="286" width="280" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="307" text-anchor="middle" dominant-baseline="central">chunk + embed</text>
    <text class="ts" x="340" y="325" text-anchor="middle" dominant-baseline="central">4096-byte · minilm 384-dim</text>
  </g>

  <line x1="340" y1="338" x2="340" y2="368" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-blue">
    <rect x="200" y="368" width="280" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="389" text-anchor="middle" dominant-baseline="central">codex.db</text>
    <text class="ts" x="340" y="407" text-anchor="middle" dominant-baseline="central">fts5 + vec0 · 1,187 docs · 93 MB</text>
  </g>

  <line x1="340" y1="420" x2="340" y2="450" class="arr" marker-end="url(#arrow)"/>

  <g class="node c-gray">
    <rect x="200" y="450" width="280" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="471" text-anchor="middle" dominant-baseline="central">codex_apply.py</text>
    <text class="ts" x="340" y="489" text-anchor="middle" dominant-baseline="central">full-text + vector search</text>
  </g>
</svg>
</body>
</html>
